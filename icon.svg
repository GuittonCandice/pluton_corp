<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <circle cx="16" cy="16" r="16" fill="#FAF8F5"/>
  <g transform="rotate(-20 16 16)">
    <!-- Anneau derrière la planète -->
    <ellipse
      cx="16"
      cy="16"
      rx="12"
      ry="3.2"
      fill="none"
      stroke="#c45c26"
      stroke-width="2"
      pathLength="100"
      stroke-dasharray="50 50"
      stroke-dashoffset="50"
    />
    <!-- Planète -->
    <circle cx="16" cy="16" r="7.5" fill="#1e3a5f"/>
    <circle cx="13.8" cy="13.8" r="1.6" fill="#2d5a8e" opacity="0.55"/>
    <!-- Anneau devant la planète -->
    <ellipse
      cx="16"
      cy="16"
      rx="12"
      ry="3.2"
      fill="none"
      stroke="#c45c26"
      stroke-width="2"
      pathLength="100"
      stroke-dasharray="50 50"
      stroke-dashoffset="0"
    />
  </g>
</svg>
