<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, system-ui, sans-serif; background: #f4f3f0; padding: 16px; width: 920px; }
    .shell { background: #fff; border-radius: 12px; border: 1px solid #e5e4e9; overflow: hidden; box-shadow: 0 8px 32px rgba(19,19,32,.08); }
    .top { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid #eee; }
    .top img { height: 28px; }
    .top span { font-size: 11px; color: #9e9eb0; text-transform: uppercase; letter-spacing: .08em; }
    .kanban { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 14px; background: #fafaf8; min-height: 280px; }
    .col { background: #fff; border: 1px solid #ecebef; border-radius: 10px; padding: 8px; }
    .col h4 { font-size: 10px; color: #6c5ce7; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
    .card { background: #fff; border: 1px solid #e8e7ec; border-radius: 8px; padding: 8px; margin-bottom: 6px; font-size: 11px; }
    .card strong { display: block; font-size: 11px; margin-bottom: 3px; }
    .card small { color: #7a7a8c; font-size: 9px; }
    .tag { display: inline-block; margin-top: 4px; padding: 2px 6px; border-radius: 999px; background: #efedfe; color: #6c5ce7; font-size: 8px; }
  </style>
</head>
<body>
  <div class="shell">
    <div class="top">
      <img src="logo-delices-corner.png" alt="Délices Corner" />
      <span>Pipeline · Kanban</span>
    </div>
    <div class="kanban">
      <div class="col"><h4>À appeler</h4><div class="card"><strong>Mariage Dupont</strong><small>12 oct. · 120 pers.</small><span class="tag">Cocktail</span></div></div>
      <div class="col"><h4>En cours</h4><div class="card"><strong>Séminaire LVMH</strong><small>3 nov. · Paris 8e</small><span class="tag">Devis envoyé</span></div><div class="card"><strong>Anniversaire 50 ans</strong><small>18 sept.</small></div></div>
      <div class="col"><h4>Validé</h4><div class="card"><strong>Inauguration boutique</strong><small>25 août · 80 pers.</small></div></div>
      <div class="col"><h4>Facturé</h4><div class="card"><strong>Garden party</strong><small>Juin 2026</small></div></div>
    </div>
  </div>
</body>
</html>
